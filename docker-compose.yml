services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_APP_NAME=InsightFlow
    depends_on:
      - backend
    networks:
      - insightflow

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-insightflow}:${POSTGRES_PASSWORD:-insightflow_secret}@postgres:5432/${POSTGRES_DB:-insightflow}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CORS_ORIGINS=http://localhost:3000
      - UPLOAD_DIR=/data/uploads
      - MAX_FILE_SIZE_MB=100
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - upload_data:/data/uploads
    networks:
      - insightflow

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m arq app.tasks.worker.WorkerSettings
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-insightflow}:${POSTGRES_PASSWORD:-insightflow_secret}@postgres:5432/${POSTGRES_DB:-insightflow}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - UPLOAD_DIR=/data/uploads
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - upload_data:/data/uploads
    networks:
      - insightflow

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insightflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insightflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-insightflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insightflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - insightflow

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - insightflow

volumes:
  postgres_data:
  redis_data:
  upload_data:

networks:
  insightflow:
    driver: bridge
